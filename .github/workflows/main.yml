name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build singa
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Install frontend deps
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      # ── Go ──────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download Go modules
        run: go mod tidy

      - name: Build linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/singa-linux-amd64 .

      - name: Build linux/arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/singa-linux-arm64 .

      - name: Build linux/arm (armv7)
        run: |
          GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o dist/singa-linux-armv7 .

      - name: Build linux/386
        run: |
          GOOS=linux GOARCH=386 go build -trimpath -ldflags="-s -w" -o dist/singa-linux-386 .

      - name: Compress binaries
        run: |
          cd dist
          for f in singa-*; do
            gzip -k "$f"
          done

      # ── Release ─────────────────────────────────────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/singa-linux-amd64.gz
            dist/singa-linux-arm64.gz
            dist/singa-linux-armv7.gz
            dist/singa-linux-386.gz
          generate_release_notes: true

      - name: Upload artifacts (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: singa-binaries
          path: dist/
          retention-days: 7
