name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate tag
        if: github.event_name == 'workflow_dispatch'
        run: echo "RELEASE_TAG=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - uses: actions/checkout@v4

      - name: Download srs rule sets
        run: |
          mkdir -p assets/srs
          curl -fsSL https://raw.githubusercontent.com/1715173329/IPCIDR-CHINA/refs/heads/rule-set/cn.srs -o assets/srs/geoip-cn.srs
          BASE_SITE="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geosite"
          BASE_IP="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/sing/geo/geoip"
          for name in cn private gfw "geolocation-!cn"; do
            curl -fsSL "${BASE_SITE}/${name}.srs" -o "assets/srs/geosite-${name}.srs"
            echo "Downloaded ${name}.srs ($(wc -c < "assets/srs/geosite-${name}.srs") bytes)"
          done
          for name in private google facebook telegram twitter netflix; do
            curl -fsSL "${BASE_IP}/${name}.srs" -o "assets/srs/geoip-${name}.srs"
            echo "Downloaded ${name}.srs ($(wc -c < "assets/srs/geoip-${name}.srs") bytes)"
          done

      # ── Frontend ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Build frontend
        working-directory: web
        run: npm install && npm run build

      # ── Go ────────────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - run: go mod tidy

      - name: Build binaries
        run: |
          mkdir -p dist
          build() {
            local goos=$1 goarch=$2 goarm=$3 name=$4
            echo "Building $name..."
            env GOOS=$goos GOARCH=$goarch GOARM=$goarm \
              go build -trimpath -ldflags="-s -w" -o "dist/$name" .
          }
          build linux amd64   ""  singa-linux-amd64
          build linux arm64   ""  singa-linux-arm64
          build linux arm     7   singa-linux-armv7
          build linux 386     ""  singa-linux-386
          build linux mips    ""  singa-linux-mips
          build linux mipsle  ""  singa-linux-mipsle

      - name: Compress
        run: cd dist && for f in singa-*; do gzip -k "$f"; done

      - name: Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.gz
          generate_release_notes: true

      - name: Release (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: dist/*.gz
          generate_release_notes: false
